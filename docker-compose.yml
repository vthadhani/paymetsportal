version: "3.8"

# ── PayPortal BZ ─────────────────────────────────────────────────────────────
# Single container: nginx (port 6680) + Node.js backend (internal port 3000)
# Both managed by supervisord inside one image.
# ─────────────────────────────────────────────────────────────────────────────

services:
  payportal:
    build: .
    container_name: payportal-bz
    restart: unless-stopped
    ports:
      - "6680:6680"
    environment:
      - PTP_LOGIN=${PTP_LOGIN}
      - PTP_SECRET=${PTP_SECRET}
      - PTP_ENDPOINT=${PTP_ENDPOINT}
      - PTP_RETURN_URL=${PTP_RETURN_URL}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - WASENDER_API_KEY=${WASENDER_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6680/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Add to your environment section:
# - ADMIN_USERNAME=admin
# - ADMIN_PASSWORD=your_secure_password_here
