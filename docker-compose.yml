version: "3.8"

# ── PayPortal BZ — docker-compose.yml ────────────────────────────────────────
# Two services:
#   frontend  — nginx serving the static HTML app on port 6680
#   backend   — Node.js proxy that calls the Atlantic Bank PlaceToPay API
#
# For LOCAL testing:  docker compose up --build
# For COOLIFY:        Point Coolify at this repo (Dockerfile = ./Dockerfile)
#                     Add env vars in Coolify UI. Port expose/map: 6680.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Frontend (nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payportal-frontend
    restart: unless-stopped
    ports:
      - "6680:6680"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6680/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Backend (Node.js PlaceToPay proxy) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payportal-backend
    restart: unless-stopped
    # Backend is NOT exposed publicly — only reachable by nginx via internal network
    environment:
      - PTP_LOGIN=${PTP_LOGIN}
      - PTP_SECRET=${PTP_SECRET}
      - PTP_ENDPOINT=${PTP_ENDPOINT}
      - PTP_RETURN_URL=${PTP_RETURN_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: payportal-network
